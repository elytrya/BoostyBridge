discord:
  role-given-embed:
    color: "#FFB6C1"
    title: "Выдача роли Discord"
    description: "Роль **{role_name}** успешно выдана игроку **{player}**."
    fields:
      - name: "Подписка"
        value: "**{level_name}**"
        inline: true
      - name: "Аккаунт"
        value: "{ping}"
        inline: true
    footer: "elytrya | github.com/elytrya/boostybridge"

  role-removed-embed:
    color: "#FF0000"
    title: "Снятие роли Discord"
    description: "Роль **{role_name}** была удалена у игрока **{player}**."
    fields:
      - name: "Причина"
        value: "Окончание или изменение подписки"
        inline: false
      - name: "Аккаунт"
        value: "{ping}"
        inline: true
    footer: "elytrya | github.com/elytrya/boostybridge"

